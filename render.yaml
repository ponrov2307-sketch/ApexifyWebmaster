services:
  - type: web
    name: apexify-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run_web.py
    healthCheckPath: /
    autoDeploy: true

  - type: worker
    name: apexify-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run_bot.py
    autoDeploy: true
